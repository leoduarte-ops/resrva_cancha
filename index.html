<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Espacios - Calendario Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --azul-marino: #002D72;
            --azul-claro: #0056b3;
            --gris-fondo: #f4f7f9;
            --gris-borde: #dee2e6;
            --verde-libre: #28a745;
            --rojo-ocupado: #dc3545;
            --blanco: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--gris-fondo);
            color: #333;
            padding: 10px;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--blanco);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Cabecera */
        .header {
            background-color: var(--azul-marino);
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Layout Responsivo */
        .content-wrapper {
            display: flex;
            flex-direction: column; /* Móvil por defecto */
        }

        @media (min-width: 768px) {
            .content-wrapper {
                flex-direction: row; /* Escritorio */
                height: 600px;
            }
        }

        /* Sección Calendario */
        .calendar-section {
            flex: 1.2;
            padding: 20px;
            border-bottom: 1px solid var(--gris-borde);
        }

        @media (min-width: 768px) {
            .calendar-section { border-bottom: none; border-right: 1px solid var(--gris-borde); }
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--azul-marino);
            text-transform: capitalize;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-name {
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            color: #777;
            padding-bottom: 10px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            position: relative;
        }

        .day:hover:not(.empty) { background: #e7f1ff; }
        .day.today { border: 2px solid var(--azul-claro); font-weight: bold; }
        .day.selected { background: var(--azul-marino) !important; color: white; }
        .day.full { background: #f8f8f8; color: #ccc; cursor: not-allowed; }
        .day.full::after {
            content: "•";
            color: var(--rojo-ocupado);
            position: absolute;
            bottom: 2px;
        }

        /* Sección Horarios */
        .slots-section {
            flex: 1;
            padding: 20px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
        }

        .slots-container {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .slot {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--gris-borde);
            cursor: pointer;
            font-size: 14px;
        }

        .slot.available { border-left: 5px solid var(--verde-libre); }
        .slot.selected { background: var(--azul-marino) !important; color: white; }
        .slot.occupied { background: #eee; color: #999; border-left: 5px solid #bbb; cursor: not-allowed; }

        /* Footer */
        .footer {
            padding: 20px;
            border-top: 1px solid var(--gris-borde);
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            background: white;
        }

        @media (min-width: 600px) {
            .footer { flex-direction: row; justify-content: space-between; }
        }

        .btn-confirm {
            background: var(--azul-marino);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        @media (min-width: 600px) { .btn-confirm { width: auto; } }

        .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h2 id="inst-name">Reserva de Cancha Sintética</h2>
    </div>

    <div class="content-wrapper">
        <!-- Calendario Completo -->
        <div class="calendar-section">
            <div class="cal-header">
                <i class="fas fa-chevron-left" style="cursor:pointer"></i>
                <span id="month-name">Mes Año</span>
                <i class="fas fa-chevron-right" style="cursor:pointer"></i>
            </div>
            <div class="grid" id="calendar-grid">
                <!-- Se genera con JS -->
            </div>
        </div>

        <!-- Franjas Horarias -->
        <div class="slots-section">
            <p style="font-weight:bold; margin-bottom:15px; color:var(--azul-claro)">
                Horarios: <span id="selected-date-label">Selecciona un día</span>
            </p>
            <div class="slots-container" id="slots-list">
                <!-- Se genera con JS -->
            </div>
        </div>
    </div>

    <div class="footer">
        <div id="summary">Selecciona fecha y hora para continuar.</div>
        <button class="btn-confirm" id="btn-save" disabled>CONFIRMAR RESERVA</button>
    </div>
</div>

<script>
    const date = new Date();
    let selectedDay = date.getDate();
    let selectedSlot = null;

    const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    const dayLabels = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        document.getElementById('month-name').innerText = `${months[date.getMonth()]} ${date.getFullYear()}`;
        grid.innerHTML = "";

        // Nombres de los días
        dayLabels.forEach(d => {
            const el = document.createElement('div');
            el.className = "day-name";
            el.innerText = d;
            grid.appendChild(el);
        });

        const firstDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
        const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        
        // Ajuste Lunes a Domingo
        let startPos = firstDay === 0 ? 6 : firstDay - 1;

        for(let i=0; i<startPos; i++) {
            grid.appendChild(document.createElement('div'));
        }

        for(let d=1; d<=daysInMonth; d++) {
            const dayEl = document.createElement('div');
            dayEl.className = "day";
            if(d === date.getDate()) dayEl.classList.add('today');
            if(d === selectedDay) dayEl.classList.add('selected');

            // Simulación de "Día Lleno" (panorama completo)
            if([5, 12, 25].includes(d)) {
                dayEl.classList.add('full');
            }

            dayEl.innerText = d;
            dayEl.onclick = () => {
                if(dayEl.classList.contains('full')) return alert("Este día no tiene cupos disponibles.");
                selectedDay = d;
                selectedSlot = null;
                renderCalendar();
                renderSlots(d);
            };
            grid.appendChild(dayEl);
        }
    }

    function renderSlots(day) {
        const list = document.getElementById('slots-list');
        const label = document.getElementById('selected-date-label');
        const saveBtn = document.getElementById('btn-save');
        
        label.innerText = `${day} de ${months[date.getMonth()]}`;
        list.innerHTML = "";
        saveBtn.disabled = true;

        // De 07:00 a 20:00 (8 PM)
        for(let h=7; h<20; h++) {
            const time = `${h.toString().padStart(2, '0')}:00 - ${(h+1).toString().padStart(2, '0')}:00`;
            const isOccupied = Math.random() < 0.3; // 30% ocupados aleatorios

            const el = document.createElement('div');
            el.className = `slot ${isOccupied ? 'occupied' : 'available'}`;
            if(selectedSlot === time) el.classList.add('selected');

            el.innerHTML = `<span>${time}</span> <span>${isOccupied ? 'Ocupado' : 'Disponible'}</span>`;
            
            if(!isOccupied) {
                el.onclick = () => {
                    selectedSlot = time;
                    renderSlots(day);
                    document.getElementById('summary').innerHTML = `Reserva: <strong>${day}/${date.getMonth()+1}</strong> a las <strong>${time}</strong>`;
                    saveBtn.disabled = false;
                };
            }
            list.appendChild(el);
        }
    }

    // Inicialización
    renderCalendar();
    renderSlots(selectedDay);
</script>

</body>
</html>
